<section class="ds-token-preview">
	<h1 class="ds-title">DS Token Starter Set</h1>
	<p class="ds-subtitle">
		Foundation tokens for color, typography, spacing, radius, elevation, and
		motion.
	</p>

	<div class="ds-grid">
		<article class="ds-card ds-shadow-2">
			<h2>Color</h2>
			<div class="ds-color-row">
				<span class="ds-swatch ds-swatch-brand"></span>
				<code>--color-brand-500</code>
			</div>
			<div class="ds-color-row">
				<span class="ds-swatch ds-swatch-surface"></span>
				<code>--color-bg-surface</code>
			</div>
			<div class="ds-color-row">
				<span class="ds-swatch ds-swatch-danger"></span>
				<code>--color-danger-500</code>
			</div>
		</article>

		<article class="ds-card ds-shadow-2">
			<h2>Typography</h2>
			<p class="ds-body-m">Body M uses --font-size-300 and --line-height-300.</p>
			<p class="ds-code">MONO_42A1</p>
		</article>

		<article class="ds-card ds-shadow-2">
			<h2>Motion</h2>
			<button type="button" class="ds-button">Hover me</button>
		</article>
	</div>
</section>
